<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
        padding-top: 1rem;
      }

      .movies {
        height: 10rem;
        width: 10rem;
        margin: 2rem;
        margin-top: 5rem;
        border: 1px solid black;
        border-radius: 8px;
      }

      .price {
        background-color: thistle;
        height: 8rem;
        padding: 1rem;
        font-size: 1rem;
      }

      .heading {
        background-color: rgba(0, 0, 0, 0.5);
        height: 2rem;
      }

      .heading,
      .price {
        color: white;
        text-align: center;
        margin: 0;
      }

      select,
      h1 {
        position: fixed;
      }

      h1 {
        top: 0px;
      }

      select {
        width: 8rem;
        top: 5rem;
      }
    </style>
  </head>
  <body>
    <h1>Book My Show</h1>
    <select>
      <option value="none">None</option>
      <option value="action">Action</option>
      <option value="romance">Romance</option>
      <option value="comedy">Comedy</option>
    </select>
    <div class="movies">
      <h3 class="heading">Action Movie - 1</h3>
      <p class="price" data-category="action">Rs. 100</p>
    </div>
    <div class="movies">
      <h3 class="heading">Action Movie - 2</h3>
      <p class="price" data-category="action">Rs 200</p>
    </div>
    <div class="movies">
      <h3 class="heading">Action Movie - 3</h3>
      <p class="price" data-category="action">Rs. 150</p>
    </div>
    <div class="movies">
      <h3 class="heading">Romance - 1</h3>
      <p class="price" data-category="romance">Rs 200</p>
    </div>
    <div class="movies">
      <h3 class="heading">Romance - 2</h3>
      <p class="price" data-category="romance">Rs. 150</p>
    </div>
    <div class="movies">
      <h3 class="heading">Romance - 3</h3>
      <p class="price" data-category="romance">Rs. 150</p>
    </div>
    <div class="movies">
      <h3 class="heading">Action Movie-4</h3>
      <p class="price" data-category="action">Rs 200</p>
    </div>
    <div class="movies">
      <h3 class="heading">Comedy - 1</h3>
      <p class="price" data-category="comedy">Rs. 100</p>
    </div>
    <div class="movies">
      <h3 class="heading">Romance - 4</h3>
      <p class="price" data-category="romance">Rs. 100</p>
    </div>
    <div class="movies">
      <h3 class="heading">Comedy - 2</h3>
      <p class="price" data-category="comedy">Rs 200</p>
    </div>
  </body>
  <script>
    // Q Make the filter work

    const dropDown = document.querySelector("select");
    dropDown.addEventListener("change", function (e) {
      const selectedGenre = e.target.value;
      const movies = document.querySelectorAll(".movies");
      if (selectedGenre === "none") {
        movies.forEach((movie) => {
          movie.style.display = "block";
        });
      } else {
        movies.forEach((movie) => {
          const priceElem = movie.querySelector("p");
          if (priceElem.getAttribute("data-category") === selectedGenre) {
            movie.style.display = "block";
          } else {
            movie.style.display = "none";
          }
        });
      }
    });
  </script>
</html>
