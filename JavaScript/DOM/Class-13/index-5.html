<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .content {
        background-color: thistle;
      }

      .notVisible {
        display: none;
      }

      .highlight {
        font-weight: bolder;
        color: steelblue;
      }
    </style>
  </head>
  <body>
    <div id="myDiv" class="content notVisible">Hello, world!</div>
  </body>
  <script>
    const div = document.getElementById("myDiv");
    console.log(div);
    if (div.classList.contains("notVisible")) {
      div.classList.remove("notVisible");
    }
    div.classList.add("highlight");
  </script>
</html>
