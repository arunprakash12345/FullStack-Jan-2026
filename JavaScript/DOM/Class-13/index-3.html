<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul>
      <li>1</li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
      <li>5</li>
      <li>6</li>

      <li>8</li>
      <li>9</li>
      <li>10</li>
    </ul>
  </body>
  <script>
    const ul = document.querySelector("ul");
    const allItem = document.querySelectorAll("li");
    const newLi = document.createElement("li");
    newLi.textContent = 7;
    const eighthElem = allItem[6];
    ul.insertBefore(newLi, eighthElem);
  </script>
</html>
