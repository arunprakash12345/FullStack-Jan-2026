<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <ul id="list">
      <li class="item">A</li>
      <li class="item">B</li>
    </ul>
  </body>
  <script>
    const items = document.getElementsByClassName("item");
    const item1 = document.querySelectorAll(".item");
    console.log("html collection ", items.length);
    console.log("nodelist ", item1.length);
    const newItem = document.createElement("li");
    newItem.textContent = "C";
    newItem.className = "item";
    document.getElementById("list").appendChild(newItem);
    console.log("html collection", items.length);
    console.log("nodelist ", item1.length);
    items[0].textContent = "updated Content";
    console.log(items);
    console.log(item1);

    // query selector vs getElementBy*
    // query selector -> snapshot of object
    // if you add or remove elements from that object
    // query will have still old object where as getElementBy* will have
    // updated live object
  </script>
</html>
