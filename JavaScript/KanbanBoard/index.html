<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban Board</title>
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/d9edf17dc9.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/shortid-dist@1.0.5/dist/shortid-2.2.13.min.js"
      defer
    ></script>
  </head>
  <body>
    <header class="toolbox-cont">
      <div class="toolbox-priority-cont">
        <!-- lightPink -> Task which need to be picked/done -->
        <!-- lightgreen -> task which are in progress -->
        <!-- lightblue -> under review/qa -->
        <!-- purple -> task which are completed -->
        <div class="pink color">To Do</div>
        <div class="green color">In Progress</div>
        <div class="blue color">Review</div>
        <div class="purple color">Done</div>
        <div class="thistle color">Show All</div>
      </div>
      <h1 class="toolbox-header">Kanban Board</h1>
      <div class="action-btn-cont">
        <div class="add-btn"><i class="fa-solid fa-plus"></i></div>
        <div class="remove-btn"><i class="fa-solid fa-trash"></i></div>
      </div>
    </header>

    <main class="main-cont"></main>

    <dialog class="modal-cont">
      <textarea
        name=""
        id=""
        placeholder="Enter You Task Details"
        class="modal-cont-textarea"
      ></textarea>
      <div class="priority-color-cont">
        <div class="priority-color pink active">To Do</div>
        <div class="priority-color blue">In Progress</div>
        <div class="priority-color green">Review</div>
        <div class="priority-color purple">Done</div>
      </div>
    </dialog>
  </body>
  <script src="./script.js"></script>
</html>
