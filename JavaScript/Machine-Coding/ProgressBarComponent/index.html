<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProgressBar</title>
    <style>
      .progress-bar {
        height: 2rem;
        border: 0.1rem solid black;
        border-radius: 0.4rem;
        margin: 3rem;
        padding: 0.15rem;
      }

      .bar {
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(78, 120, 70);
        border-radius: 0.4rem;
        padding: 0.2rem;
        height: 1.5rem;
      }
    </style>
  </head>
  <body>
    <div class="progress-bar">
      <div class="bar" style="width: 5%">5%</div>
    </div>
  </body>

  <script>
    const token = setInterval(() => {
      const bar = document.querySelector(".bar");
      const currentPercentage = parseInt(bar.style.width);
      if (currentPercentage < 100) {
        const newPercentage = `${currentPercentage + 10}%`;
        const number = currentPercentage + 10;
        bar.style.width = number > 100 ? "98%" : newPercentage;
        bar.innerText = number > 100 ? "100%" : newPercentage;
      } else {
        clearInterval(token);
      }
    }, 1500);
  </script>
</html>
