    // const containerElem = document.createElement("div");
    // containerElem.setAttribute("id", "parent");

    //  <div id="child">
    //     <h1 id="greeting">Hello From JS</h1>

    //   </div>
    // `;
    // const root = document.querySelector(".root");
    // root.appendChild(containerElem);

    const root = ReactDOM.createRoot(document.querySelector(".root"));
    const childElem = React.createElement("div", { id: "child" }, [
      React.createElement("h1", { id: "greeting" }, "Hello From React"),
      React.createElement("h1", { id: "greeting" }, "Hello From React-1"),
    ]);

    // Create an element using React.createElement
    // React.createElement takes at least three arguments:
    // 1. The tag name of the HTML element to create
    // 2. The properties of the element (or null if none)
    // 3. The children of this element (or text content)
    const containerElem = React.createElement(
      "div",
      { id: "parent" },
      childElem,
    );
    // ReactDOM.render(h1, root);

    // JSX (JavaScript XML Language is Syntactic sugar) -> React.createElement -> render
    function App() {
      return (
        <div id="parent">
          <div id="child">
            <h1 id="greeting">Hello From React</h1>
            <h1 id="greeting">Hello From React - 1</h1>
          </div>
        </div>
      );
    }

    root.render(<App />);
    // console.log(h1);
  </script>
