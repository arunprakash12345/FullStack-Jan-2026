<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table</title>
  </head>
  <body>
    <!-- table - whole wrapper for table
     thead - wrapper for table header row
     tbody - wrapper for table data 
     tr - table row 
     th - table heading 
     td - table data -->
    <table border="1" style="border-collapse: collapse">
      <caption>
        <h2>Student PSP Details</h2>
      </caption>
      <thead>
        <tr>
          <th>S.No</th>
          <th>Name</th>
          <th>Subject</th>
          <th>PSP</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td rowspan="2">Aryan</td>
          <td>DSA</td>
          <td>85</td>
        </tr>
        <tr>
          <td>2</td>
          <td>SQL</td>
          <td>90</td>
        </tr>
        <tr>
          <td>3</td>
          <td rowspan="2">Priyanka</td>
          <td>DSA</td>
          <td>88</td>
        </tr>
        <tr>
          <td>4</td>
          <td>SQL</td>
          <td>86</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td colspan="3">Total Average PSP of batch</td>
          <td>87.25</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
