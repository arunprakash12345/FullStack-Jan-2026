<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Internal CSS -->
    <style>
      /* Selection {
            list of styles / properties
        } */
      h1 {
        color: blue;
      }

    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <!-- Inline CSS -->
    <h1 style="color: tomato">This is the Heading</h1>
    <h1 style="color: violet">This is another heading</h1>
  </body>
</html>
