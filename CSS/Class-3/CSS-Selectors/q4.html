<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .class1 {
        color: blue;
      }

      .class2 {
        color: red;
      }
    </style>
  </head>
  <body>
    <!-- Select the obvious p tags and make class 1 blue and class 2 red  -->
    <p>Random</p>
    <p>Random</p>
    <p>Random</p>
    <p>Random</p>
    <p>Random</p>
    <p>Random</p>
    <p>Random</p>
    <p class="class1">Make me Blue</p>
    <p class="class2">Make me Red</p>

    <!-- Class Attribute should be used when we want to apply same css at multiple places/elements
     which reduces css duplication -->
    <p class="class1">Lorem ipsum dolor sit.</p>
  </body>
</html>
