<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        /* 140 color which browser support */
        /* color: darksalmon; */

        /* hex code or rgba */
        /* 0 - 255 */
        /* a - 0 - 1 */
        /* 1 - opaque (not transparent at all) */
        /* color: rgb(78, 108, 139, 1); */
        /* hex code #aabbcc
        aa - rr
        bb - gg
        cc - bb */
        /* 00 - ff */
        /* color: #966868; */

        /* HSL - Hue Saturation Lightness */
        /* Hue - 0-360 degrees */
        /* saturation - 0 - 100% */
        /* lightness - 0 - 100% */
        color: hsl(125, 28%, 55%);
      }
    </style>
  </head>
  <body>
    <h1>This is a simple heading</h1>
  </body>
</html>
