<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlexBox</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .container {
        background-color: rgb(165, 105, 95);
        border: 2px solid black;
        border-radius: 5px;
        margin: 5px;
        height: 500px;
        width: 100%;
        display: flex;
        /* flex-direction : it defines how 
        children items are aligned (row, column, 
        row-reverse, column-reverse) */
        /* flex-direction: row; */
        /* works as per width available on screen */
        /* flex-wrap: wrap; */
        /* flex-flow: flex-direction flex-wrap */
        flex-flow: row wrap;
        /* this property applies main-axis */
        justify-content: center;
        /* this property applies cross-axis */
        /* start end center stretch */
        align-items: center;

        align-content: center;
        /* row-gap: 10px;
        column-gap: 25px; */
        /* gap: 25px; */
      }

      .item {
        height: 50px;
        width: 50px;
        background-color: dodgerblue;
        margin: 10px;
        border-radius: 5px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .item5 {
           /* order is helpful in order 
           re-arrange the order in 
      which elements are rendered*/
        order: 5;
      }

      .item1 {
        order: 1;
               /* flex grow is used when we want items to grow with ratio
      when width of screen increases*/
        flex-grow: 1;
      }

      .item3 {
        order: 3;
        flex-grow: 2;
          /* flex shrink is used when we want items to shrink
      when width of screen decreases*/
        flex-shrink: 2;
        /* initial width of item */
        flex-basis: 100px;
        /* flex: flex-grow flex-shrink flex-basis */
        flex: 2 2 100px;
      }

      .item4 {
        order: 4;
      }
      
      .item2 {
        order: 2;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="item item1">1</div>
      <div class="item item2">2</div>
      <div class="item item3">3</div>
      <div class="item item4">4</div>
      <div class="item item5">5</div>
       <div class="item item1">1</div>
      <div class="item item2">2</div>
      <div class="item item3">3</div>
      <div class="item item4">4</div>
      <div class="item item5">5</div>
       <div class="item item1">1</div>
      <div class="item item2">2</div>
      <div class="item item3">3</div>
      <div class="item item4">4</div>
      <div class="item item5">5</div>
  </body>
</html>
