<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Display Property</title>
    <style>
      h1 {
        /* block level element */
        width: 300px;
        height: 200px;
        background-color: lightblue;
        border: 2px solid blue;
        margin: 10px;
      }

      img {
        width: 100px;
        height: 100px;
        display: inline-block;
        background-color: lightcoral;
        border: 2px solid blue;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <h1>this is the heading</h1>
    <h1>this is the heading</h1>
    <h1>this is the heading</h1>
    <img src="" alt="Test1" />
    <img src="" alt="Test2" />
    <img src="" alt="Test3" />
  </body>
</html>
