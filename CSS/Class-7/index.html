<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Page</title>
    <!-- priority vs specific -->
    <!-- whenever there is css conflict (specificity comes into act) -->
    <style>
      /* 100 > 010 > 001 */
      /* 1,0,0 */
      #h1 {
        background-color: steelblue;
      }
      /* 0,1,0 */
      .firstHeading {
        background-color: darkolivegreen;
      }
      /* 0,0,1 */
      h1 {
        background-color: thistle;
      }
    </style>
    <!-- <link rel="stylesheet" href="style.css" /> -->
  </head>
  <body>
    <h1 class="firstHeading" id="h1">This is a Heading</h1>
    <p>This is a paragraph of text.</p>
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
    <a href="#">This is a link</a>
  </body>
</html>
