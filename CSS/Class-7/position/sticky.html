<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        height: 2000px;
        width: 100%;
        border: 1px solid black;
        border-radius: 8px;
        padding: 10px;
      }

      .box {
        height: 200px;
        width: 100%;
        background-color: lightblue;
        border-radius: 5px;
        margin-bottom: 10px;
      }

      #box_3 {
        position: sticky;
        top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">1</div>
      <div class="box">2</div>
      <div class="box" id="box_3">3</div>
      <div class="box" id="box_4">4</div>
    </div>
  </body>
</html>
